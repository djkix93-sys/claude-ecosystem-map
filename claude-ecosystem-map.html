function LayerLabel({ num, title, color = C.cyan }) {
  const layerStr = `LAYER ${String(num).padStart(2, "0")}`;
  const [typedLayer, setTypedLayer] = useState("");
  const [typedTitle, setTypedTitle] = useState("");

  useEffect(() => {
    setTypedLayer("");
    setTypedTitle("");
    let i = 0;
    // Type layer string first
    const typeLayer = () => {
      if (i < layerStr.length) {
        setTypedLayer(layerStr.slice(0, i + 1));
        i++;
        setTimeout(typeLayer, 70);
      } else {
        // Then type title
        let j = 0;
        const typeTitle = () => {
          if (j < title.length) {
            setTypedTitle(title.slice(0, j + 1));
            j++;
            setTimeout(typeTitle, 60);
          }
        };
        setTimeout(typeTitle, 120);
      }
    };
    setTimeout(typeLayer, 80);
  }, [num, title]);

  return (
    <div style={{ textAlign: "center", marginBottom: 14 }}>
      <div style={{ fontSize: 11, letterSpacing: "0.38em", color, opacity: 0.8, marginBottom: 5, minHeight: 16 }}>
        {typedLayer}
        {typedLayer.length < layerStr.length && (
          <span style={{ animation: "blink 0.6s step-end infinite", marginLeft: 1 }}>|</span>
        )}
      </div>
      <div style={{ fontSize: 18, letterSpacing: "0.22em", color, fontWeight: 800, minHeight: 26 }}>
        {typedTitle}
        {typedLayer.length === layerStr.length && typedTitle.length < title.length && (
          <span style={{ animation: "blink 0.6s step-end infinite", marginLeft: 1 }}>|</span>
        )}
      </div>
    </div>
  );
}

        position: "relative", height: 140,

          const opacity = isCenter ? 1 : 0.35;

              onClick={isCenter ? tapCenter : undefined}

                opacity,
                transition: "transform 0.75s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.75s ease",
                zIndex: isCenter ? 3 : 1,
                cursor: isCenter ? "pointer" : "default",

                background: isCenter ? `${m.color}14` : `${m.color}06`,

// ── stage 4: features (cycling) ────────────────────────────────────────────

function FeaturesStage({ surface, idx, total, onNext, onContinue }) {
  const [activeChip, setActiveChip] = useState(0);
  const [revealed, setRevealed] = useState(new Set([0]));
  const [orbX, setOrbX] = useState(0);
  const [orbY, setOrbY] = useState(0);
  const [typedName, setTypedName] = useState("");
  const chipRefs = useRef([]);
  const containerRef = useRef(null);

  // Typewriter for surface name on each new surface
  useEffect(() => {
    setTypedName("");
    let i = 0;
    const type = () => {
      if (i < surface.name.length) {
        setTypedName(surface.name.slice(0, i + 1));
        i++;
        setTimeout(type, 55);
      }
    };
    setTimeout(type, 60);
  }, [surface.name]);

  useEffect(() => {
    setActiveChip(0);
    setRevealed(new Set([0])); // first chip visible on load
    chipRefs.current = [];
  }, [surface.name]);

  useEffect(() => {
    const interval = setInterval(() => {
      setActiveChip(prev => {
        const next = (prev + 1) % surface.features.length;
        setRevealed(r => { const s = new Set(r); s.add(next); return s; });
        return next;
      });
    }, 900);
    return () => clearInterval(interval);
  }, [surface.features.length]);

  // Position orb over chip 0 immediately on surface change, after render
  useEffect(() => {
    let raf = requestAnimationFrame(() => {
      const chip = chipRefs.current[0];
      const container = containerRef.current;
      if (chip && container) {
        const chipRect = chip.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        setOrbX(chipRect.left - containerRect.left + chipRect.width / 2);
        setOrbY(chipRect.top - containerRect.top + chipRect.height / 2);
      }
    });
    return () => cancelAnimationFrame(raf);
  }, [surface.name]);

  useEffect(() => {
    const chip = chipRefs.current[activeChip];
    const container = containerRef.current;
    if (chip && container) {
      const chipRect = chip.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      setOrbX(chipRect.left - containerRect.left + chipRect.width / 2);
      setOrbY(chipRect.top - containerRect.top + chipRect.height / 2);
    }
  }, [activeChip]);

  return (
    <div key={surface.name} style={{ width: "100%" }}>
      {/* Surface counter */}
      <div className="ai" style={{ textAlign: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 9, letterSpacing: "0.35em", color: C.dim, marginBottom: 8 }}>
          SURFACE {idx + 1} / {total}
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 6 }}>
          {SURFACES.map((_, i) => (
            <div key={i} style={{
              width: i === idx ? 22 : 6, height: 5, borderRadius: 3,
              background: i === idx ? surface.color
                : i < idx ? `${surface.color}40`
                : "rgba(255,255,255,0.1)",
              transition: "all 0.3s ease",
              boxShadow: i === idx ? `0 0 8px ${surface.color}80` : "none",
            }} />
          ))}
        </div>
      </div>

      {/* Surface name */}
      <div className="au d1" style={{ textAlign: "center", marginBottom: 14 }}>
        <h2 style={{
          fontSize: 22, fontWeight: 900, color: surface.color,
          margin: 0, letterSpacing: "0.06em",
          textShadow: `0 0 24px ${surface.color}70`,
        }}>
          {typedName}
          {typedName.length < surface.name.length && (
            <span style={{ animation: "blink 0.6s step-end infinite", opacity: 1 }}>|</span>
          )}
        </h2>
        {surface.sub && (
          <div style={{ fontSize: 10, color: surface.color, opacity: 0.5, marginTop: 3, letterSpacing: "0.18em" }}>
            {surface.sub}
          </div>
        )}
        <div style={{ fontSize: 10, color: C.dim, marginTop: 4, letterSpacing: "0.18em" }}>
          {surface.note}
        </div>
      </div>

      {/* KEY FUNCTIONS label */}
      <div className="au d2" style={{
        fontSize: 13, letterSpacing: "0.22em", color: "rgba(255,255,255,0.75)",
        fontWeight: 800, textAlign: "center", marginBottom: 14,
      }}>
        KEY FUNCTIONS
      </div>

      {/* Mirror layout (APK) or standard orb+chips */}
      {surface.mirrorLayout ? (
        <div className="au d2" style={{
          textAlign: "center",
          marginBottom: 14,
          padding: "32px 20px",
          background: `${surface.color}08`,
          border: `1px solid ${surface.color}25`,
          borderRadius: 12,
          position: "relative",
          overflow: "hidden",
        }}>
          {/* Pulsating amber orb centred */}
          <div style={{
            position: "absolute",
            left: "50%", top: "50%",
            width: 120, height: 120,
            borderRadius: "50%",
            background: `radial-gradient(circle, ${surface.color}40 0%, ${surface.color}15 50%, transparent 75%)`,
            transform: "translate(-50%, -50%)",
            filter: "blur(8px)",
            animation: "pulse 2.5s ease-in-out infinite",
            pointerEvents: "none",
            zIndex: 0,
          }} />
          <div style={{
            fontSize: 18, fontWeight: 800, color: surface.color,
            letterSpacing: "0.04em", lineHeight: 1.3,
            textShadow: `0 0 18px ${surface.color}60`,
            marginBottom: 10, position: "relative", zIndex: 1,
          }}>
            {surface.mirrorLabel}
          </div>
          <div style={{
            fontSize: 10, color: C.dimmer,
            letterSpacing: "0.12em", fontStyle: "italic",
            lineHeight: 1.6, position: "relative", zIndex: 1,
          }}>
            {surface.mirrorSub}
          </div>
        </div>
      ) : (
        /* Standard chips with scanning orb */
        <div
          ref={containerRef}
          style={{ position: "relative", marginBottom: 14 }}
        >
          {/* Orb */}
          <div style={{
            position: "absolute",
            left: orbX,
            top: orbY,
            width: 100, height: 100,
            borderRadius: "50%",
            background: `radial-gradient(circle, ${surface.color}30 0%, ${surface.color}10 50%, transparent 75%)`,
            transform: "translate(-50%, -50%)",
            transition: "left 0.45s cubic-bezier(0.4, 0, 0.2, 1), top 0.45s cubic-bezier(0.4, 0, 0.2, 1)",
            pointerEvents: "none",
            zIndex: 2,
            filter: `blur(6px)`,
            boxShadow: `0 0 30px ${surface.color}30, 0 0 60px ${surface.color}12`,
            opacity: 0.85,
          }} />

          {/* Chips */}
          <div style={{
            display: "flex", flexWrap: "wrap", gap: 8,
            justifyContent: "center", position: "relative", zIndex: 3,
          }}>

const PASSWORD = "the distil_AI_tion";

function MatrixCanvas() {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;

    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    };
    resize();
    window.addEventListener("resize", resize);

    // 3D nodes with z depth — dense subtle field
    const N = 160;
    const nodes = Array.from({ length: N }, () => ({
      x: Math.random(),
      y: Math.random(),
      z: Math.random(),              // 0=far, 1=near
      vx: (Math.random() - 0.5) * 0.00018,
      vy: (Math.random() - 0.5) * 0.00018,
      vz: (Math.random() - 0.5) * 0.0001,
      r: Math.random() * 0.8 + 0.3,
      glow: Math.random() > 0.85,
      phase: Math.random() * Math.PI * 2,
    }));

    const project = (node, w, h) => {
      // Perspective projection — near nodes appear larger and brighter
      const fov = 1.8;
      const scale = fov / (fov + (1 - node.z) * 1.2);
      const px = (node.x - 0.5) * scale * w + w / 2;
      const py = (node.y - 0.5) * scale * h + h / 2;
      return { px, py, scale };
    };

    const draw = (t) => {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      // Update positions
      nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;
        n.z += n.vz;
        if (n.x < 0 || n.x > 1) n.vx *= -1;
        if (n.y < 0 || n.y > 1) n.vy *= -1;
        if (n.z < 0 || n.z > 1) n.vz *= -1;
      });

      // Sort back to front for correct rendering
      const sorted = [...nodes].sort((a, b) => a.z - b.z);

      const LINK = 0.22;

      // Draw connections — dotted lines
      for (let i = 0; i < sorted.length; i++) {
        for (let j = i + 1; j < sorted.length; j++) {
          const a = sorted[i], b = sorted[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dz = a.z - b.z;
          const d3 = Math.sqrt(dx*dx + dy*dy + dz*dz);
          if (d3 < LINK) {
            const { px: ax, py: ay } = project(a, w, h);
            const { px: bx, py: by } = project(b, w, h);
            const depthAlpha = (a.z + b.z) * 0.5;
            const alpha = (1 - d3 / LINK) * depthAlpha * 0.35;
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.lineTo(bx, by);
            ctx.strokeStyle = `rgba(0,229,195,${alpha})`;
            ctx.lineWidth = depthAlpha * 0.6;
            ctx.setLineDash([2, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
          }
        }
      }

      // Draw nodes — subtle dense field
      sorted.forEach(n => {
        const { px, py, scale } = project(n, w, h);
        const pulse = n.glow ? 0.4 + 0.3 * Math.sin(t * 0.0008 + n.phase) : 0.3;
        const r = n.r * scale * 1.8;
        const alpha = 0.15 + n.z * 0.4;

        if (n.glow && n.z > 0.4) {
          const g = ctx.createRadialGradient(px, py, 0, px, py, r * 3.5);
          g.addColorStop(0, `rgba(0,229,195,${pulse * alpha * 0.5})`);
          g.addColorStop(1, "rgba(0,229,195,0)");
          ctx.beginPath();
          ctx.arc(px, py, r * 3.5, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(px, py, Math.max(r, 0.5), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,229,195,${pulse * alpha})`;
        ctx.fill();
      });

      raf = requestAnimationFrame(draw);
    };

    raf = requestAnimationFrame(draw);
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      style={{
        position: "absolute", inset: 0,
        width: "100%", height: "100%",
        opacity: 0.75,
        pointerEvents: "none",
      }}
    />
  );
}

function LoginStage({ onComplete }) {
  const [typed, setTyped] = useState("");
  const [phase, setPhase] = useState("idle");
  const [btnActive, setBtnActive] = useState(false);
  const [cursorX, setCursorX] = useState(0);
  const [cursorY, setCursorY] = useState(0);
  const [cursorGlow, setCursorGlow] = useState(false);
  const [fadeOut, setFadeOut] = useState(false);
  const btnRef = useRef(null);
  const pwRef = useRef(null);
  const containerRef = useRef(null);

  const getPos = (el) => {
    if (!el || !containerRef.current) return null;
    const er = el.getBoundingClientRect();
    const cr = containerRef.current.getBoundingClientRect();
    return {
      x: er.left - cr.left + er.width * 0.3,
      y: er.top  - cr.top  + er.height / 2 - 14,
    };
  };

  useEffect(() => {
    const timers = [];
    const T = (fn, ms) => { const t = setTimeout(fn, ms); timers.push(t); return t; };

    // 1. Cursor appears immediately near top of form, centred
    T(() => {
      if (!containerRef.current) return;
      const cr = containerRef.current.getBoundingClientRect();
      setCursorX(cr.width * 0.45);
      setCursorY(cr.height * 0.28);
    }, 100);

    // 2. Move to password box
    T(() => {
      if (pwRef.current && containerRef.current) {
        const p = getPos(pwRef.current);
        if (p) { setCursorX(p.x); setCursorY(p.y); }
      }
    }, 800);

    // 3. Click the password box — glow, activate
    T(() => {
      setCursorGlow(true);
      T(() => {
        setCursorGlow(false);
        setPhase("typing");
        // 4. Type letter by letter
        let i = 0;
        const type = () => {
          if (i < PASSWORD.length) {
            setTyped(PASSWORD.slice(0, i + 1));
            i++;
            T(type, 80 + Math.random() * 60);
          } else {
            // 5. Pause then move to button
            T(() => {
              setPhase("moving");
              if (btnRef.current && containerRef.current) {
                const p = getPos(btnRef.current);
                if (p) {
                  setCursorX(p.x);
                  setCursorY(p.y);
                }
              }
              // 6. Click button
              T(() => {
                setCursorGlow(true);
                setBtnActive(true);
                T(() => {
                  setCursorGlow(false);
                  setFadeOut(true);
                  T(() => onComplete(), 600);
                }, 700);
              }, 900);
            }, 500);
          }
        };
        type();
      }, 450);
    }, 1600);

    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div
      ref={containerRef}
      style={{
        position: "absolute", inset: 0,
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        padding: "0 32px",
        animation: fadeOut ? "loginFadeOut 0.55s ease forwards" : "none",
      }}
    >
      <MatrixCanvas />

      {/* Logo */}
      <div style={{ textAlign: "center", marginBottom: 44, position: "relative", zIndex: 1 }}>
        <div style={{ fontSize: 9, letterSpacing: "0.45em", color: C.cyan, opacity: 0.5, marginBottom: 12 }}>
          THE DISTIL_AI_TION
        </div>
        <div style={{ fontSize: 22, fontWeight: 900, color: "#fff", letterSpacing: "0.08em", textShadow: `0 0 24px ${C.cyan}50` }}>
          VAULT ACCESS
        </div>
        <div style={{ width: 40, height: 1, background: `linear-gradient(90deg, transparent, ${C.cyan}80, transparent)`, margin: "14px auto 0" }} />
      </div>

      {/* Form */}
      <div style={{ width: "100%", maxWidth: 300, position: "relative", zIndex: 1 }}>

        {/* Username */}
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 8, letterSpacing: "0.3em", color: C.cyan, opacity: 0.55, marginBottom: 7 }}>
            IDENTIFIER
          </div>
          <div style={{
            background: "rgba(0,229,195,0.04)",
            border: `1px solid ${C.cyan}30`,
            borderRadius: 6, padding: "14px 18px",
            fontSize: 17, color: C.cyan + "cc",
            letterSpacing: "0.08em", fontFamily: "'Courier New', monospace",
          }}>
            AI_chemyst
          </div>
        </div>

        {/* Password */}
        <div style={{ marginBottom: 28 }}>
          <div style={{ fontSize: 8, letterSpacing: "0.3em", color: C.cyan, opacity: 0.55, marginBottom: 7 }}>
            PASSPHRASE
          </div>
          <div
            ref={pwRef}
            style={{
              background: phase !== "idle" ? "rgba(0,229,195,0.08)" : "rgba(0,229,195,0.04)",
              border: `1px solid ${phase !== "idle" ? C.cyan + "80" : C.cyan + "30"}`,
              borderRadius: 6, padding: "14px 18px",
              fontSize: 17, letterSpacing: "0.06em",
              fontFamily: "'Courier New', monospace",
              display: "flex", alignItems: "center",
              minHeight: 52,
              boxShadow: phase !== "idle" ? `0 0 14px ${C.cyan}22, inset 0 0 8px ${C.cyan}08` : "none",
              transition: "all 0.3s ease",
            }}
          >
            <span style={{ color: C.cyan + "ee" }}>{typed}</span>
            <span style={{
              display: "inline-block", width: 2, height: 15,
              background: C.cyan, marginLeft: 1,
              animation: phase !== "idle" ? "blink 0.75s step-end infinite" : "none",
              opacity: phase !== "idle" ? 1 : 0,
              boxShadow: `0 0 6px ${C.cyan}`,
              transition: "opacity 0.2s ease",
            }} />
          </div>
        </div>

        {/* Button */}
        <button
          ref={btnRef}
          style={{
            width: "100%", padding: "13px",
            background: btnActive ? C.cyan : "transparent",
            border: `1px solid ${btnActive ? C.cyan : C.cyan + "60"}`,
            borderRadius: 6,
            color: btnActive ? C.bg : C.cyan,
            fontSize: 11, fontWeight: 700,
            letterSpacing: "0.28em",
            fontFamily: "'Courier New', monospace",
            cursor: "default",
            transition: "all 0.35s ease",
            animation: btnActive ? "btnGlow 0.5s ease forwards" : "none",
            transform: btnActive ? "scale(1.02)" : "scale(1)",
          }}
        >
          LOG INTO VAULT
        </button>

        <div style={{ textAlign: "center", marginTop: 22, fontSize: 8, color: C.dimmer, letterSpacing: "0.18em" }}>
          AUTHORISED ACCESS ONLY · AI_CHEMYST SYSTEMS
        </div>
      </div>

      {/* Stylistic cursor — always mounted, starts at initial pos */}
      <div style={{
        position: "absolute",
        left: cursorX,
        top: cursorY,
        transition: "left 0.75s cubic-bezier(0.4, 0, 0.2, 1), top 0.75s cubic-bezier(0.4, 0, 0.2, 1)",
        pointerEvents: "none",
        zIndex: 20,
        outline: "none",
        border: "none",
        background: "transparent",
        lineHeight: 0,
      }}>
        <svg width="28" height="36" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ display: "block", overflow: "visible" }}>
          <defs>
            <linearGradient id="cursorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#00e5c3" stopOpacity="1" />
              <stop offset="60%" stopColor="#00b8a0" stopOpacity="0.95" />
              <stop offset="100%" stopColor="#9d6fff" stopOpacity="0.85" />
            </linearGradient>
          </defs>
          {/* Outer glow shape */}
          <path
            d="M4 2 L4 26 L10 20 L14 31 L18 29.5 L14 18.5 L22 18.5 Z"
            fill="url(#cursorGrad)"
            style={{
              filter: cursorGlow
                ? `drop-shadow(0 0 8px #00e5c3) drop-shadow(0 0 16px #00e5c3) drop-shadow(0 0 3px #9d6fff)`
                : `drop-shadow(0 0 4px #00e5c390) drop-shadow(0 0 8px #00e5c340)`,
              transition: "filter 0.25s ease",
            }}
          />
          {/* Inner highlight stroke */}
          <path
            d="M4 2 L4 26 L10 20 L14 31 L18 29.5 L14 18.5 L22 18.5 Z"
            fill="none"
            stroke="rgba(255,255,255,0.35)"
            strokeWidth="0.8"
          />
        </svg>
      </div>
    </div>
  );
}

// ── root ───────────────────────────────────────────────────────────────────

function App() {

  const [loggedIn, setLoggedIn] = useState(false);
  const [loggedOut, setLoggedOut] = useState(false);
  const [stage, setStage] = useState(0);
  const [surfaceIdx, setSurfaceIdx] = useState(0);
  const touchStartX = useRef(null);
  const touchStartY = useRef(null);

  // Register logout handler for CompleteStage (avoids prop drilling through render)
  useEffect(() => {
    window.__onLogout = () => setLoggedOut(true);
    return () => { delete window.__onLogout; };
  }, []);

  const handleRestart = () => {
    setLoggedOut(false);
    setLoggedIn(false);
    setStage(0);
    setSurfaceIdx(0);
  };

  const advance = () => {
    if (stage === 4) {
      if (surfaceIdx < SURFACES.length - 1) {
        setSurfaceIdx(s => s + 1);
      } else {
        setStage(5);
        setSurfaceIdx(0);
      }
    } else if (stage < 6) {
      setStage(s => s + 1);
    }
    // stage 6 (CompleteStage): advance blocked — LOG OUT button handles exit
  };

  const retreat = () => {
    if (stage === 4) {
      if (surfaceIdx > 0) {
        setSurfaceIdx(s => s - 1);
      } else {
        setStage(3);
      }
    } else if (stage === 5 && SURFACES.length > 0) {
      setStage(4);
      setSurfaceIdx(SURFACES.length - 1);
    } else if (stage > 0) {
      setStage(s => s - 1);
    }
  };

  const handleTouchStart = (e) => {
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
  };

  const handleTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    const dy = e.changedTouches[0].clientY - touchStartY.current;
    // Only trigger if horizontal swipe is dominant and long enough
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0 && stage !== 6) advance();
      else if (dx > 0) retreat();
    }
    touchStartX.current = null;
    touchStartY.current = null;
  };

  const ArrowBtn = ({ direction, onClick }) => {
    const isLeft = direction === "left";
    const disabled = isLeft && stage === 0 && surfaceIdx === 0;
    const hidden = !isLeft && stage === 6;
    if (hidden) return null;
    return (
      <button
        onClick={(e) => { e.stopPropagation(); if (!disabled) onClick(); }}
        style={{
          position: "absolute",
          top: "50%",
          [isLeft ? "left" : "right"]: 8,
          transform: "translateY(-50%)",
          zIndex: 20,
          background: "transparent",
          border: "none",
          padding: "14px 6px",
          cursor: disabled ? "default" : "pointer",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          opacity: disabled ? 0.1 : 1,
          transition: "opacity 0.3s ease",
        }}
      >
        <svg width="18" height="32" viewBox="0 0 18 32" fill="none">
          {isLeft ? (
            <polyline
              points="14,4 4,16 14,28"
              stroke={C.cyan}
              strokeWidth="2"
              strokeLinecap="round"
              strokeLinejoin="round"
              style={{ filter: `drop-shadow(0 0 5px ${C.cyan}90)` }}
            />
          ) : (
            <polyline
              points="4,4 14,16 4,28"
              stroke={C.cyan}
              strokeWidth="2"
              strokeLinecap="round"
              strokeLinejoin="round"
              style={{ filter: `drop-shadow(0 0 5px ${C.cyan}90)` }}
            />
          )}
        </svg>
      </button>
    );
  };

  const isMain = loggedIn && !loggedOut;

  return (
    <div style={{
      position: "fixed", inset: 0,
      fontFamily: "'Courier New', monospace",
      userSelect: "none",
    }}>
      <style>{css}</style>
      {/* Global matrix canvas — fills entire viewport always */}
      <MatrixCanvas />

      {/* Glass plate — opalescent edges, decorative only */}
      <div style={{
        position: "fixed", top: 0, bottom: 0,
        left: "50%", width: 422,
        transform: "translateX(-50%)",
        pointerEvents: "none", zIndex: 1,
        background: "linear-gradient(180deg, rgba(0,200,255,0.09) 0%, rgba(180,80,255,0.04) 2%, transparent 7%, transparent 93%, rgba(255,120,200,0.04) 98%, rgba(0,229,195,0.09) 100%)",
        borderLeft: "1.5px solid rgba(0,229,195,0.18)",
        borderRight: "1.5px solid rgba(180,100,255,0.18)",
        boxShadow: [
          "8px 0 50px rgba(0,229,195,0.09)",
          "-8px 0 50px rgba(180,100,255,0.09)",
          "4px 0 20px rgba(0,150,255,0.07)",
          "-4px 0 20px rgba(255,100,200,0.07)",
          "2px 0 8px rgba(255,180,50,0.05)",
          "-2px 0 8px rgba(255,180,50,0.05)",
          "inset 5px 0 18px rgba(0,229,195,0.12)",
          "inset -5px 0 18px rgba(180,100,255,0.12)",
          "inset 2px 0 8px rgba(0,160,255,0.08)",
          "inset -2px 0 8px rgba(255,80,180,0.08)",
          "inset 1px 0 3px rgba(255,200,80,0.06)",
          "inset -1px 0 3px rgba(255,200,80,0.06)",
        ].join(", "),
      }} />
      {/* Second glass layer — top/bottom iridescent lip */}
      <div style={{
        position: "fixed", top: 0, bottom: 0,
        left: "50%", width: 422,
        transform: "translateX(-50%)",
        pointerEvents: "none", zIndex: 1,
        borderTop: "1.5px solid rgba(0,200,255,0.15)",
        borderBottom: "1.5px solid rgba(255,120,200,0.15)",
        boxShadow: "inset 0 4px 20px rgba(0,200,255,0.06), inset 0 -4px 20px rgba(255,120,200,0.06)",
      }} />

      {/* Scrollable centered column */}
      <div style={{
        position: "relative", zIndex: 2,
        width: "100%", height: "100%",
        overflowY: "auto",
        display: "flex", justifyContent: "center",
      }}>
        {/* Login */}
        {!loggedIn && (
          <div style={{
            maxWidth: 420, width: "100%",
            position: "relative", minHeight: "100vh",
          }}>
            <LoginStage onComplete={() => setLoggedIn(true)} />
          </div>
        )}

        {/* Logout */}
        {loggedIn && loggedOut && (
          <div style={{
            maxWidth: 420, width: "100%",
            position: "relative", minHeight: "100vh",
          }}>
            <LogoutPage onRestart={handleRestart} />
          </div>
        )}

        {/* Main stages */}
        {isMain && (
          <div
            onTouchStart={handleTouchStart}
            onTouchEnd={handleTouchEnd}
            style={{
              minHeight: "100vh",
              width: "100%",
              maxWidth: "420px",
              position: "relative",
              display: "flex",
              flexDirection: "column",
              boxSizing: "border-box",
            }}
          >
            {/* scanline */}
            <div style={{
              position: "fixed",
              left: 0, right: 0, height: "60px",
              background: "linear-gradient(transparent, rgba(0,229,195,0.04), transparent)",
              animation: "scanline 5s linear infinite",
              pointerEvents: "none",
              zIndex: 50,
            }} />

            {/* Header + progress bar */}
            <div style={{
              position: "absolute", top: 0, left: 0, right: 0,
              zIndex: 10, padding: "14px 18px 0",
            }}>
              {/* Progress bar row */}
              <div style={{
                display: "flex", gap: 3, marginBottom: 8,
              }}>
                {[...Array(7)].map((_, i) => (
                  <div key={i} style={{
                    flex: 1,
                    height: 3,
                    borderRadius: 2,
                    background: i === stage
                      ? "rgba(255,255,255,0.75)"
                      : i < stage
                      ? "rgba(255,255,255,0.28)"
                      : "rgba(255,255,255,0.1)",
                    transition: "all 0.4s ease",
                  }} />
                ))}
              </div>
              {/* Label row */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 8, letterSpacing: "0.3em", color: "rgba(255,255,255,0.42)" }}>AI_CHEMYST</span>
                <span style={{ fontSize: 7, letterSpacing: "0.2em", color: "rgba(255,255,255,0.35)", fontStyle: "italic" }}>The distil_AI_tion</span>
                <span style={{ fontSize: 8, letterSpacing: "0.2em", color: "rgba(255,255,255,0.42)" }}>{stage + 1} / 7</span>
              </div>
            </div>

            {/* Nav arrows */}
            <ArrowBtn direction="left"  onClick={retreat} />
            <ArrowBtn direction="right" onClick={advance} />

            {/* Main content */}
            <div style={{
              flex: 1,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "center",
              padding: "64px 42px 36px",
              minHeight: "100vh",
              boxSizing: "border-box",
            }}>
              {stage === 0 && <IntroStage onContinue={advance} />}
              {stage === 1 && <ModelsStage onContinue={advance} />}
              {stage === 2 && <HarnessesStage onContinue={advance} />}
              {stage === 3 && <SurfacesStage onContinue={advance} />}
              {stage === 4 && (
                <FeaturesStage
                  surface={SURFACES[surfaceIdx]}
                  idx={surfaceIdx}
                  total={SURFACES.length}
                  onNext={() => setSurfaceIdx(s => s + 1)}
                  onContinue={() => { setStage(5); setSurfaceIdx(0); }}
                />
              )}
              {stage === 5 && <InstructionsStage onContinue={advance} />}
              {stage === 6 && <CompleteStage />}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    // Mount the app
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
